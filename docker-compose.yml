# docker-compose.yml
services:
  db:
    image: postgres:15-alpine
    container_name: ai-scout-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_job_scout
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  service_a:
    build: ./service_a
    container_name: service-a
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./service_a:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_job_scout
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: